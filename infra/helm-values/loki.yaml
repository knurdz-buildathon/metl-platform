# Loki Helm values
# metl-platform/infra/helm-values/loki.yaml

loki:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: managed-premium
  config:
    limits_config:
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_concurrent_tail_requests: 10
      retention_period: 168h
    chunk_store_config:
      max_look_back_period: 168h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 168h

promtail:
  enabled: true
  config:
    snippets:
      pipelineStages:
        - docker: {}
        - match:
            selector: '{namespace="metl-system"}'
            stages:
              - json:
                  expressions:
                    level: level
                    service: service
                    event: event

grafana:
  enabled: false  # Using the Grafana from prometheus stack

fluent-bit:
  enabled: false
