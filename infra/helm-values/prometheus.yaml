# Prometheus Stack Helm values
# metl-platform/infra/helm-values/prometheus.yaml

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "50GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: managed-premium
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    enableAdminAPI: false
    walCompression: true
    scrapeInterval: "15s"
    evaluationInterval: "15s"
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          continue: true
    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://control-plane.metl-system.svc.cluster.local:3000/api/alerts'
            send_resolved: true
      - name: 'critical'
        webhook_configs:
          - url: 'http://control-plane.metl-system.svc.cluster.local:3000/api/alerts/critical'
            send_resolved: true

grafana:
  enabled: true
  admin:
    existingSecret: ""
    password: "metl-admin-2026"
  ingress:
    enabled: true
    hosts:
      - grafana.metl.run
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: managed-premium
  dashboards:
    default:
      metl-dashboard:
        url: https://raw.githubusercontent.com/grafana/dashboards/master/k8s-cluster.json
        datasource: Prometheus
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Enable scraping for Metal services
serviceMonitor:
  enabled: true
  namespace: metl-system
  labels:
    app: metl
