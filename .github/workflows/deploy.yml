name: Build and Deploy Metl Platform

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ===========================================
  # Build Matrix: all services + frontend
  # ===========================================
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - control-plane
          - orchestration-agent
          - resource-allocator
          - deployment-engine
          - sre-agent
          - eco-mode
          - ejection-agent
          - scaling-agent
          - simple-vault
          - vibe-coder
          - security-hunter
        include:
          - service: frontend
            context: ./frontend
            image: metl-platform-frontend
          - service: control-plane
            context: ./services/control-plane
            image: metl-platform-control-plane
          - service: orchestration-agent
            context: ./services/orchestration-agent
            image: metl-platform-orchestration-agent
          - service: resource-allocator
            context: ./services/resource-allocator
            image: metl-platform-resource-allocator
          - service: deployment-engine
            context: ./services/deployment-engine
            image: metl-platform-deployment-engine
          - service: sre-agent
            context: ./services/sre-agent
            image: metl-platform-sre-agent
          - service: eco-mode
            context: ./services/eco-mode
            image: metl-platform-eco-mode
          - service: ejection-agent
            context: ./services/ejection-agent
            image: metl-platform-ejection-agent
          - service: scaling-agent
            context: ./services/scaling-agent
            image: metl-platform-scaling-agent
          - service: simple-vault
            context: ./services/simple-vault
            image: metl-platform-simple-vault
          - service: vibe-coder
            context: ./agents/vibe-coder
            image: metl-platform-vibe-coder
          - service: security-hunter
            context: ./agents/security-hunter
            image: metl-platform-security-hunter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ===========================================
  # Deploy to VM-1 (App Server) on main push
  # ===========================================
  deploy-app:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VM-1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM1_HOST }}
          username: metladmin
          key: ${{ secrets.VM1_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/metl-ops
            echo "=== Pulling latest images ==="
            docker-compose -f docker-compose.app.yml pull
            echo "=== Restarting services ==="
            docker-compose -f docker-compose.app.yml up -d --remove-orphans
            echo "=== Health checks ==="
            sleep 5
            curl -sf http://localhost:3001/api/health || echo "WARNING: Control-plane health check failed"
            echo "=== Cleanup ==="
            docker image prune -af --filter "until=168h"
            docker system prune -af --filter "until=168h" || true
            echo "=== Deploy complete ==="
